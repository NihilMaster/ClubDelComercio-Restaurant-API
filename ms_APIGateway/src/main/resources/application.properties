spring.application.name=ms_APIGateway

server.port=8080

# Rutas hardcoded
spring.cloud.gateway.routes[0].id=administrator-ms
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/admin/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[1].id=orders-ms
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/orders/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# Load Balancer (opcional si quieres usar lb://)
spring.cloud.loadbalancer.enabled=true